# URL Shortener — Nginx reverse proxy
# Docker DNS resolver bilan service name'larini runtime'da resolve qiladi.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker embedded DNS (valid=10s — service restart bo'lsa ham qayta resolve).
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # --- Upstream variables (nginx faqat variable ishlatilganda re-resolve qiladi).
    # proxy_pass ichida $redirect_upstream, $api_upstream, $admin_upstream ko'rinishida.
    map $host $redirect_upstream { default "redirect-service:8080"; }
    map $host $api_upstream      { default "api-service:8000"; }
    # RV10 2.3: admin-panel runs as non-root `nginx` user on :8080.
    map $host $admin_upstream    { default "admin-panel:8080"; }

    # --- Logging
    log_format json_main escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"method":"$request_method",'
          '"path":"$request_uri",'
          '"status":$status,'
          '"bytes":$body_bytes_sent,'
          '"rt":$request_time,'
          '"urt":"$upstream_response_time",'
          '"ua":"$http_user_agent",'
          '"ref":"$http_referer"'
        '}';
    access_log  /var/log/nginx/access.log  json_main;

    # --- Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens off;
    client_max_body_size 10m;

    # --- Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml
        font/ttf
        font/otf;

    # --- Rate limit zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=redirect:10m rate=100r/s;

    # --- Security headers (server blocklarga taalluqli)
    map $sent_http_content_type $security_x_content_type_nosniff { default "nosniff"; }

    # Extra vhost hooks (conf.d/*.conf) bu yerda yuklanadi.
    include /etc/nginx/conf.d/*.conf;

    # =====================================================
    # HTTP server (port 80)
    # Prod da HTTPS ga redirect qilish uchun pastdagi bloqni oching.
    # =====================================================
    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  _;

        # Security headers (RV10 1.8).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Content-Security-Policy — Angular build needs 'unsafe-inline'/'unsafe-eval'
        # for PrimeNG runtime styles and Angular's JIT bootstrap until we enable
        # strict CSP via a build-time nonce. connect-src is 'self' because every
        # API call goes through this same nginx.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self' data:;" always;

        # HSTS (RV10 1.8). Safe on :80 because nothing real should land here
        # in prod without TLS — browsers ignore HSTS on plain HTTP anyway.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # --- Prod uchun HTTPS redirect (kerak bo'lsa oching):
        # if ($http_x_forwarded_proto != "https") {
        #     return 301 https://$host$request_uri;
        # }

        # Local healthcheck (nginx o'zining holati uchun)
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # --- Prometheus metrics external'ga yopiq (faqat internal network).
        location = /metrics {
            return 403;
        }

        # RV10 1.5: api-service `Instrumentator` mounts /metrics INSIDE the app
        # (no /api prefix), so once reverse-proxied under /api/ it answers at
        # /api/metrics. Block both the exact path and any defence-in-depth
        # variant before the /api/ prefix-match proxy below.
        location = /api/metrics     { return 403; }
        location ~ ^/api/.*metrics$ { return 403; }

        # --- API
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://$api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # --- OpenAPI / Swagger / ReDoc (api-service beradi)
        location ~ ^/(docs|redoc|openapi\.json)(/|$) {
            proxy_pass http://$api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- SPA routes: bular regex'dan OLDIN match bo'lishi kerak (^~ prefix priority).
        # Aks holda "dashboard", "login", "register" kabi yo'llar qisqa-kod
        # regex'iga tushib, redirect-service'ga 404 beradi.
        location = /login       { proxy_pass http://$admin_upstream; proxy_set_header Host $host; }
        location = /register    { proxy_pass http://$admin_upstream; proxy_set_header Host $host; }
        location ^~ /dashboard  { proxy_pass http://$admin_upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        location ^~ /assets     { proxy_pass http://$admin_upstream; proxy_set_header Host $host; }

        # --- Short-code redirect: 1..10 alnum/underscore/dash → redirect-service.
        location ~ "^/([A-Za-z0-9_-]{1,10})$" {
            limit_req zone=redirect burst=200 nodelay;

            proxy_pass http://$redirect_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Hech qachon kesh qilinmasin — har bosish analytics'ga ketadi.
            proxy_hide_header Cache-Control;
            proxy_hide_header Pragma;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;

            proxy_connect_timeout 2s;
            proxy_send_timeout    5s;
            proxy_read_timeout    5s;
        }

        # --- Fallback: admin-panel (Angular SPA). Bosh sahifa, /dashboard, assets.
        location / {
            proxy_pass http://$admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # =====================================================
    # HTTPS server (port 443).
    # Uncomment after provisioning certs (e.g. certbot/Let's Encrypt or an
    # internal CA). Also flip the HTTPS-redirect `if` block up top once
    # certs are live, so :80 only serves the ACME challenge and a 301.
    # =====================================================
    # server {
    #     listen       443 ssl http2;
    #     listen       [::]:443 ssl http2;
    #     server_name  _;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # Security headers — mirror the :80 block, plus HSTS preload is safe here.
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
    #     # ... (HTTP server bloq ichidagi location'lar bilan bir xil)
    # }
}
