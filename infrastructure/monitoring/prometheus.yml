# Prometheus scrape config for URL Shortener stack.
# Service names resolved via Docker DNS on `url-shortener-net`.

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: urlshortener
    env: dev

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: redirect-service
    metrics_path: /metrics
    static_configs:
      - targets: ["redirect-service:8080"]
        labels:
          service: redirect-service

  - job_name: api-service
    metrics_path: /metrics
    static_configs:
      - targets: ["api-service:8000"]
        labels:
          service: api-service

  - job_name: analytics-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["analytics-worker:9091"]
        labels:
          service: analytics-worker

