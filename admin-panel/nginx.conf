# In-container nginx config for the Angular SPA.
# The root reverse proxy (infrastructure/) forwards /, /dashboard, etc. here.
# This nginx only serves static assets — API calls are handled upstream.

server {
    # RV10 2.3: runs under `nginxinc/nginx-unprivileged` (uid 101), which
    # cannot bind <1024. Listen on 8080 internally; the infrastructure
    # reverse proxy forwards here.
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # Long cache for hashed assets (Angular outputHashing=all)
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache index.html so users pick up new bundles
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Optional: allow a runtime /assets/config.json override without rebuild
    location = /assets/config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback — all non-asset routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
