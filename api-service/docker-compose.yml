services:
  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: urlsh/api-service:0.1.0
    container_name: api-service
    env_file: .env
    environment:
      # Allow overriding inside compose without touching .env
      - ENVIRONMENT=${ENVIRONMENT:-development}
    networks:
      - url-shortener-net
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

networks:
  url-shortener-net:
    external: true
    name: url-shortener-net
